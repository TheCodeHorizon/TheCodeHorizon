<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/normalize.css/normalize.css">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.6;
    }

    header {
      background: #159957;
      background: linear-gradient(120deg, #155799, #159957);
      color: white;
      padding: 3rem 1rem;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 2.5rem;
    }

    header p {
      margin-top: 0.5rem;
      font-size: 1.2rem;
    }

    main {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: #666;
      font-size: 0.9rem;
      border-top: 1px solid #eee;
    }
  </style>
</head>

<body>

  <!-- ✅ Custom Header -->
  <header>
    <h1>The Code Horizon</h1>
  </header>

  <!-- ✅ Page Content -->
  <main>
    {{ content }}
  </main>

  <!-- ✅ Custom Footer -->
  <footer>
    <p>TheCodeHorizon is maintained by Dharani Palraj</p>
  </footer>

</body>
</html>
